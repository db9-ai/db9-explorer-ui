name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag (e.g. 0.1.0)"
        required: true

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run build

      - name: Package dist
        run: |
          echo "${{ inputs.version }}" > dist/version.txt
          tar -czf explorer.tar.gz -C dist .
          sha256sum explorer.tar.gz > explorer.tar.gz.sha256

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "v${{ inputs.version }}" \
            --title "v${{ inputs.version }}" \
            --generate-notes \
            explorer.tar.gz \
            explorer.tar.gz.sha256
